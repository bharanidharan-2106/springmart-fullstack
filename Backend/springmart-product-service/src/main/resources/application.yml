server:
  port: 8082

spring:
  application:
    name: SPRINGMART-PRODUCT-SERVICE
  data:
    mongodb:
      uri: mongodb://localhost:27017/springmart_product_db
      auto-index-creation: true
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    default-property-inclusion: NON_NULL

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.springmart.product: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
