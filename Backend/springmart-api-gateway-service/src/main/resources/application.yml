server:
  port: 8080
spring:
  application:
    name: SPRINGMART-API-GATEWAY
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: [GET,POST,PUT,DELETE,PATCH,OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
