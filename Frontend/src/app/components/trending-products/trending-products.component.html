<section class="trending-products py-5 bg-white">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-5">
      <div>
        <h2 class="display-6 fw-bold text-dark mb-2">Trending Products</h2>
        <div class="heading-underline mt-2"></div>
      </div>
      <a routerLink="/products" class="btn btn-outline-dark px-4 py-2 rounded-pill d-none d-md-block">View All</a>
    </div>

    <div class="row g-4" *ngIf="products.length > 0; else noProducts">
      <div class="col-12 col-md-6 col-lg-3" *ngFor="let product of products">
        <div class="product-card card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative">
          <div class="image-wrapper position-relative overflow-hidden bg-light p-4 text-center">
            <img [src]="productService.getProductImage(product)" [alt]="product.productName" class="img-fluid product-img transition-all" />
          </div>
          <div class="card-body p-4 d-flex flex-column">
            <div class="d-flex align-items-center mb-2" *ngIf="product.averageRating">
              <div class="stars text-warning d-flex">
                <mat-icon *ngFor="let star of getStars(product.averageRating || 0)" class="star-icon">star</mat-icon>
                <mat-icon *ngIf="hasHalfStar(product.averageRating || 0)" class="star-icon">star_half</mat-icon>
              </div>
              <span class="text-muted ms-2 small">({{ product.averageRating }})</span>
            </div>
            <h3 class="h6 fw-bold text-dark mb-1 text-truncate">{{ product.productName }}</h3>
            <p class="text-muted small mb-2">{{ product.brandName }}</p>
            <div class="mt-auto d-flex justify-content-between align-items-center pt-3">
              <span class="fs-5 fw-bold text-dark">{{ product.price | currency }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <ng-template #noProducts>
      <p class="text-center text-muted py-4 mb-0">No products available yet. Check back soon!</p>
    </ng-template>
  </div>
</section>
