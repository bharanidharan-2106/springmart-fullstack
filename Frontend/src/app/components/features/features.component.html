<section class="features py-5 bg-white">
  <div class="container">
    <div class="row g-4 justify-content-center">
      <div class="col-sm-6 col-lg-3" *ngFor="let feature of features">
        <div class="feature-card h-100 text-center p-4 rounded-4 bg-light transition-all border border-light">
          <div class="icon-circle mb-4 mx-auto d-flex align-items-center justify-content-center bg-white shadow-sm rounded-circle">
            <span class="fs-2">{{feature.icon}}</span>
          </div>
          <h3 class="h5 fw-bold text-dark mb-2">{{feature.title}}</h3>
          <p class="text-muted mb-0 small">{{feature.text}}</p>
        </div>
      </div>
    </div>
  </div>
</section>
