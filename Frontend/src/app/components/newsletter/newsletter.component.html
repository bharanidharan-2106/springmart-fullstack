<section class="newsletter py-5">
  <div class="container py-4">
    <div class="row justify-content-center text-center">
      <div class="col-md-8 col-lg-6">
        <div class="newsletter-content bg-white p-5 rounded-4 shadow-sm border border-light position-relative overflow-hidden">
          <div class="bg-shape position-absolute top-0 start-0 w-100 h-100 opacity-10"></div>
          <div class="position-relative z-1">
            <mat-icon class="mail-icon text-danger mb-3" style="font-size: 48px; width: 48px; height: 48px;">mark_email_unread</mat-icon>
            <h2 class="display-6 fw-bold text-dark mb-3">Stay Updated</h2>
            <p class="text-muted mb-4 fs-6">Subscribe to receive latest offers, new arrivals and product updates directly to your inbox.</p>
            
            <form class="d-flex flex-column flex-sm-row gap-3">
              <input type="email" class="form-control form-control-lg flex-grow-1 rounded-pill px-4 shadow-none" placeholder="Enter your email address" required>
              <button type="submit" class="btn btn-subscribe btn-lg rounded-pill px-4 fw-medium text-white shadow-sm hover-lift">Subscribe</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
