<div class="dashboard-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h4 mb-0 fw-bold">Analytics Dashboard</h2>
    <button class="btn btn-outline-secondary d-flex align-items-center gap-2">
      <mat-icon class="fs-5">download</mat-icon> Export Report
    </button>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-6 col-lg-3" *ngFor="let stat of stats">
      <div class="card border-0 shadow-sm h-100 stat-card">
        <div class="card-body d-flex align-items-center">
          <div class="icon-wrapper rounded-circle p-3 d-flex align-items-center justify-content-center text-white me-3" [ngClass]="stat.color">
            <mat-icon>{{ stat.icon }}</mat-icon>
          </div>
          <div>
            <h6 class="text-muted mb-1">{{ stat.label }}</h6>
            <h3 class="mb-0 fw-bold">{{ stat.value }}</h3>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h5 class="fw-bold mb-0">Platform Monitoring</h5>
        </div>
        <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 300px;">
          <div class="text-center text-muted">
            <mat-icon class="display-1 text-light mb-3">bar_chart</mat-icon>
            <p>Interactive charts will be loaded here.</p>
          </div>
        </div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h5 class="fw-bold mb-0">Recent Activity</h5>
        </div>
        <div class="card-body">
          <ul class="list-unstyled mb-0" *ngIf="pendingVendors > 0; else noActivity">
            <li class="d-flex mb-3 align-items-start">
              <div class="bg-warning-subtle text-warning rounded-circle p-2 me-3">
                <mat-icon>pending_actions</mat-icon>
              </div>
              <div>
                <p class="mb-0 fw-semibold">Pending Vendor Approvals</p>
                <small class="text-muted">{{ pendingVendors }} merchant(s) awaiting review</small>
              </div>
            </li>
          </ul>
          <ng-template #noActivity>
            <p class="text-muted mb-0 text-center py-4">No pending activity</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
